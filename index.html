<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07071a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>moment of peace</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:      #000000;
      --ambient: rgba(255, 140, 40, 0.05);
      --label:   rgba(255, 220, 180, 0.90);
      --title:   rgba(255, 200, 140, 0.45);

      /* sunset glow — resting */
      --gs1: rgba(255, 180,  60, 0.28);
      --gs2: rgba(240, 110,  30, 0.14);
      --gs3: rgba(180,  50,  10, 0.07);
      /* sunset glow — expanded */
      --gl1: rgba(255, 180,  60, 0.60);
      --gl2: rgba(240, 110,  30, 0.30);
      --gl3: rgba(180,  50,  10, 0.16);

    }

    @media (prefers-color-scheme: light) {
      /* only apply light theme when dark mode isn't manually forced */
      :root:not([data-theme="dark"]) {
        --bg:      #f0eeff;
        --ambient: rgba(160, 130, 255, 0.07);
        --label:   rgba(90, 70, 180, 0.45);
        --title:   rgba(90, 70, 180, 0.20);

        --gs1: rgba(160, 180, 255, 0.32);
        --gs2: rgba(180, 150, 255, 0.16);
        --gs3: rgba(150, 130, 230, 0.08);
        --gl1: rgba(160, 180, 255, 0.58);
        --gl2: rgba(180, 150, 255, 0.28);
        --gl3: rgba(150, 130, 230, 0.13);
      }
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.4s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%,
        var(--ambient) 0%,
        transparent 70%
      );
      animation: ambience var(--cycle-duration, 8s) ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes ambience {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1;   }
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 52px;
      z-index: 1;
    }

    /* ── orb wrapper — holds orb + timer arc ── */
    .orb-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── session timer arc ── */
    .timer-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .timer-svg.active { opacity: 1; }
    .timer-svg.done   { opacity: 0; transition: opacity 3s ease; }

    .timer-track {
      fill: none;
      stroke: rgba(150, 200, 255, 0.10);
      stroke-width: 1.5;
    }
    .timer-fill {
      fill: none;
      stroke: rgba(160, 210, 255, 0.45);
      stroke-width: 1.5;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
      filter: url(#glow);
    }

    /* ── orb ── */
    .orb {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      position: relative;
      cursor: pointer;

      background: radial-gradient(circle at 36% 32%,
        #fff8ee 0%,
        #f8d060 16%,
        #f07030 36%,
        #c03818 60%,
        #701008 82%,
        #1c0200 100%
      );

      /* initial resting shadow — JS takes over after first tick */
      box-shadow:
        0 0  10px  3px  rgba(255, 180,  60, 0.30),
        0 0  32px  12px rgba(240, 110,  30, 0.16),
        0 0  80px  40px rgba(180,  50,  10, 0.08);

      transform: scale(0.84); /* initial resting scale — JS takes over immediately */
      will-change: transform, filter;
      transition: opacity 0.8s ease;
    }

    .orb.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .orb::before {
      content: '';
      position: absolute;
      top: 12%;
      left: 18%;
      width: 32%;
      height: 22%;
      border-radius: 50%;
      /* gradient-only highlight — no filter, avoids nested-filter compositing artifact */
      background: radial-gradient(ellipse at 40% 40%,
        rgba(255, 255, 255, 0.72) 0%,
        rgba(255, 255, 255, 0.28) 45%,
        transparent 100%
      );
    }

    .orb::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        transparent 45%,
        rgba(255, 190,  80, 0.12) 65%,
        transparent 80%
      );
      animation: halo var(--cycle-duration, 8s) ease-in-out infinite;
    }

    .orb.paused::after {
      animation-play-state: paused;
    }

    @keyframes halo {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }

    /* ── particles canvas ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── breath label ── */
    .breath-label {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--label);
      height: 1em;
      user-select: none;
      transition: opacity 0.8s ease;
      min-width: 120px;
      text-align: center;
    }

    .breath-label.fade { opacity: 0; }

    /* ── bottom controls ── */
    .controls {
      position: fixed;
      bottom: 52px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 2;
    }

    /* pattern dots */
    .pattern-dots {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--label);
      opacity: 0.35;
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .dot.active {
      opacity: 0.85;
      transform: scale(1.5);
    }

    /* timer buttons */
    .timer-btns {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .tbtn {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--label);
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.3s ease;
      user-select: none;
    }

    .tbtn:hover  { opacity: 0.70; }
    .tbtn.active { opacity: 0.95; }

    /* sound toggles */
    .sound-row {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .sbtn {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--label);
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.3s ease;
      user-select: none;
    }
    .sbtn:hover  { opacity: 0.70; }
    .sbtn.active { opacity: 0.95; }

    /* ── shape toggle ── */
    .shape-row {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .shbtn {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--label);
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.3s ease;
      user-select: none;
    }
    .shbtn:hover  { opacity: 0.70; }
    .shbtn.active { opacity: 0.95; }

    /* ── bloom shape ── */
    .bloom-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }
    .bloom-svg.active {
      opacity: 1;
      pointer-events: auto;
    }
    .petal       { fill: url(#petalGrad); }
    .petal-extra { opacity: 0; }

    /* ── time-of-day color overlay ── */
    #tod-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      transition: background 90s ease; /* very slow, imperceptible shift */
    }

    /* ── dim overlay ── */
    #dim-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 1.5s ease;
    }
    #dim-overlay.on { opacity: 0.91; }

    /* ── blue light filter overlay ── */
    #warm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 140, 20, 0.22);
      opacity: 0;
      pointer-events: none;
      z-index: 101;
      transition: opacity 1.2s ease;
    }
    #warm-overlay.on { opacity: 1; }

    /* ── bottom-right button strip ── */
    #bottom-right {
      position: fixed;
      bottom: 28px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 9px;
      z-index: 200;
    }
    .br-row {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    #bottom-right span {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--label);
      opacity: 0.45;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.3s ease, color 0.3s ease;
    }
    #reset-btn {
      font-size: 0.80rem;
      letter-spacing: 0;
    }
    #nothing-btn.active { opacity: 0.95 !important; }
    .nothing-hide {
      opacity: 0 !important;
      transition: opacity 0.8s ease;
    }
    #bottom-right span:hover   { opacity: 0.70; }
    #dim-btn.active       { opacity: 0.95 !important; color: rgba(255,220,160,0.9) !important; }
    #dark-btn.active      { opacity: 0.95 !important; }
    #warm-btn.active      { opacity: 0.95 !important; color: rgba(255,190,80,0.9)  !important; }
    #stars-btn.active     { opacity: 0.95 !important; color: rgba(255,245,200,0.9) !important; }
    #fireflies-btn.active { opacity: 0.95 !important; color: rgba(180,255,120,0.9) !important; }
    #moon-btn.active      { opacity: 0.95 !important; color: rgba(255,242,195,0.9) !important; }
    #leaves-btn.active    { opacity: 0.95 !important; color: rgba(220,130,40,0.9)  !important; }

    /* ── moon ── */
    #moon {
      position: fixed;
      top: 5%;
      right: 8%;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255, 242, 195, 0.92);
      box-shadow:
        0 0  14px  5px rgba(255, 220, 140, 0.35),
        0 0  44px 18px rgba(255, 200, 100, 0.12);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transition: opacity 3s ease;
    }
    #moon.on { opacity: 1; }
    #moon::after {
      content: '';
      position: absolute;
      top: -5px;
      left: 13px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--bg);
    }

    /* ── branding ── */
    #branding {
      position: fixed;
      bottom: 22px;
      left: 22px;
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 0.20;
      pointer-events: none;
      z-index: 1;
    }

    #brand-logo {
      width: 20px;
      height: 20px;
      /* render white regardless of original SVG fill */
      filter: brightness(0) invert(1);
    }

    #brand-name {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--label);
    }

    /* ── title ── */
    .title {
      position: fixed;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 0.75rem;
      font-style: italic;
      color: var(--title);
      letter-spacing: 0.1em;
      user-select: none;
      z-index: 1;
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>

  <div class="scene">
    <div class="orb-wrap">
      <!-- SVG timer arc -->
      <svg class="timer-svg" id="timerSvg" viewBox="0 0 220 220">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <circle class="timer-track" cx="110" cy="110" r="104"/>
        <circle class="timer-fill" id="timerFill" cx="110" cy="110" r="104"/>
      </svg>

      <!-- bloom shape -->
      <svg class="bloom-svg" id="bloomSvg" viewBox="0 0 220 220">
        <defs>
          <linearGradient id="petalGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#c03010" stop-opacity="0.85"/>
            <stop offset="50%"  stop-color="#f07030"/>
            <stop offset="100%" stop-color="#f8d060"/>
          </linearGradient>
          <filter id="petalGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g id="petalGroup" transform="translate(110,110)" filter="url(#petalGlow)">
          <g transform="rotate(0)">  <path class="petal petal-base" id="petal0"/></g>
          <g transform="rotate(60)"> <path class="petal petal-base" id="petal1"/></g>
          <g transform="rotate(120)"><path class="petal petal-base" id="petal2"/></g>
          <g transform="rotate(180)"><path class="petal petal-base" id="petal3"/></g>
          <g transform="rotate(240)"><path class="petal petal-base" id="petal4"/></g>
          <g transform="rotate(300)"><path class="petal petal-base" id="petal5"/></g>
          <g transform="rotate(30)"> <path class="petal petal-extra" id="petal6"/></g>
          <g transform="rotate(90)"> <path class="petal petal-extra" id="petal7"/></g>
          <g transform="rotate(150)"><path class="petal petal-extra" id="petal8"/></g>
          <g transform="rotate(210)"><path class="petal petal-extra" id="petal9"/></g>
          <g transform="rotate(270)"><path class="petal petal-extra" id="petal10"/></g>
          <g transform="rotate(330)"><path class="petal petal-extra" id="petal11"/></g>
        </g>
        <circle id="bloomCenter" cx="110" cy="110" r="8" fill="#f8e090" filter="url(#petalGlow)"/>
      </svg>

      <div class="orb" id="orb"></div>
    </div>

    <div class="breath-label" id="label">breathe in</div>
  </div>

  <!-- bottom controls -->
  <div class="controls">
    <div class="pattern-dots">
      <span class="dot active" data-pattern="4-4"     title="even 4·4"></span>
      <span class="dot"        data-pattern="4-7-8"   title="4·7·8"></span>
      <span class="dot"        data-pattern="box"     title="box 4·4·4·4"></span>
    </div>
    <div class="timer-btns">
      <span class="tbtn" data-min="0">—</span>
      <span class="tbtn" data-min="1">1 min</span>
      <span class="tbtn" data-min="3">3 min</span>
      <span class="tbtn" data-min="5">5 min</span>
    </div>
    <div class="sound-row">
      <span class="sbtn" id="silenceBtn">silence</span>
      <span class="sbtn" id="binauralBtn">binaural</span>
      <span class="sbtn" id="rainBtn">rain</span>
      <span class="sbtn" id="frogsBtn">frogs</span>
    </div>
    <div class="shape-row">
      <span class="shbtn active" id="orbBtn">orb</span>
      <span class="shbtn" id="bloomBtn">bloom</span>
    </div>
  </div>

  <div id="branding">
    <img id="brand-logo" src="1.svg" alt="" />
    <span id="brand-name">Twin Kites LLC</span>
  </div>

  <div id="tod-overlay"></div>
  <div id="dim-overlay"></div>
  <div id="warm-overlay"></div>
  <div id="moon"></div>
  <div id="bottom-right">
    <div class="br-row">
      <span id="nothing-btn">nothing</span>
      <span id="reset-btn">↺</span>
      <span id="fireflies-btn">fireflies</span>
      <span id="moon-btn">moon</span>
      <span id="leaves-btn">leaves</span>
      <span id="stars-btn">stars</span>
    </div>
    <div class="br-row">
      <span id="warm-btn">warm</span>
      <span id="dark-btn">dark</span>
      <span id="dim-btn">dim</span>
    </div>
  </div>

  <p class="title">moment of peace</p>

  <script>
    // ── breathing patterns ──────────────────────────────────────────────────
    // Each phase: [label, seconds]
    const PATTERNS = {
      '4-4':   [['breathe in', 4], ['breathe out', 4]],
      '4-7-8': [['breathe in', 4], ['hold', 7], ['breathe out', 8]],
      'box':   [['breathe in', 4], ['hold', 4], ['breathe out', 4], ['hold', 4]],
    };

    // ── localStorage preferences ─────────────────────────────────────────────
    // called only from user-gesture handlers, so currentPattern + darkOn are always live
    function savePrefs() {
      localStorage.setItem('mop_pattern', currentPattern);
      localStorage.setItem('mop_dark',    darkOn);
    }

    // load saved pattern, fall back to '4-4'
    const _sp = localStorage.getItem('mop_pattern');
    let currentPattern = (_sp && PATTERNS[_sp]) ? _sp : '4-4';
    let phaseIndex     = 0;
    let phaseStart     = performance.now();
    let paused         = false;
    let pausedAt       = 0;

    // sync the active dot to the restored pattern
    document.querySelectorAll('.dot').forEach(d =>
      d.classList.toggle('active', d.dataset.pattern === currentPattern)
    );

    const orb   = document.getElementById('orb');
    const label = document.getElementById('label');

    function getPhases() { return PATTERNS[currentPattern]; }

    function totalCycleMs() {
      return getPhases().reduce((s, [, sec]) => s + sec * 1000, 0);
    }

    // Keep --cycle-duration in sync for the halo CSS animation
    function updateCssCycle() {
      const dur = totalCycleMs() / 1000 + 's';
      document.documentElement.style.setProperty('--cycle-duration', dur);
    }
    updateCssCycle();

    // smooth ease-in-out — same feel as CSS ease-in-out
    function easeInOut(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }

    // Map phase to visual expansion (0=small, 1=large), with easing on moving phases
    function phaseToExpansion(idx, rawProgress) {
      const phases = getPhases();
      const name = phases[idx][0];
      const p = easeInOut(rawProgress);
      if (name === 'breathe in')  return p;
      if (name === 'breathe out') return 1 - p;
      if (idx > 0 && phases[idx-1][0] === 'breathe in')  return 1;
      if (idx > 0 && phases[idx-1][0] === 'breathe out') return 0;
      return idx === 0 ? 0 : 1;
    }

    // Interpolate box-shadow between resting (t=0) and full (t=1) — pastel glow palette
    function lerpShadow(t) {
      const s = (a, b) => (a + (b - a) * t).toFixed(1);
      const a = (lo, hi) => (lo + (hi - lo) * t).toFixed(2);
      return [
        `0 0 ${s(10,28)}px ${s(3,12)}px rgba(255,180, 60,${a(0.30,0.65)})`,
        `0 0 ${s(32,80)}px ${s(12,36)}px rgba(240,110, 30,${a(0.16,0.32)})`,
        `0 0 ${s(80,180)}px ${s(40,100)}px rgba(180, 50, 10,${a(0.08,0.18)})`,
      ].join(', ');
    }

    // ── label ───────────────────────────────────────────────────────────────
    let displayedLabel = null;

    function updateLabel(text) {
      if (text === displayedLabel) return;
      label.classList.add('fade');
      setTimeout(() => {
        label.textContent = text;
        label.classList.remove('fade');
        displayedLabel = text;
      }, 400);
      displayedLabel = text;
    }

    // ── pause on orb / bloom click ──────────────────────────────────────────
    function togglePause() {
      paused = !paused;
      if (paused) {
        orb.classList.add('paused');
        pausedAt = performance.now();
        updateLabel('hold');
      } else {
        orb.classList.remove('paused');
        phaseStart += (performance.now() - pausedAt);
        displayedLabel = null;
      }
    }
    orb.addEventListener('click', togglePause);

    // ── pattern selection ───────────────────────────────────────────────────
    document.querySelectorAll('.dot').forEach(dot => {
      dot.addEventListener('click', () => {
        currentPattern = dot.dataset.pattern;
        phaseIndex = 0;
        phaseStart = performance.now();
        displayedLabel = null;
        updateCssCycle();

        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        savePrefs();
      });
    });

    // ── session timer ────────────────────────────────────────────────────────
    const timerSvg  = document.getElementById('timerSvg');
    const timerFill = document.getElementById('timerFill');
    const R = 104;
    const CIRCUM = 2 * Math.PI * R;
    timerFill.style.strokeDasharray  = CIRCUM;
    timerFill.style.strokeDashoffset = CIRCUM; // start empty

    let timerDuration = 0; // ms, 0 = off
    let timerStart    = null;

    document.querySelectorAll('.tbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const min = parseInt(btn.dataset.min, 10);
        if (min === 0) {
          timerDuration = 0;
          timerStart = null;
          timerSvg.classList.remove('active', 'done');
          timerFill.style.strokeDashoffset = CIRCUM;
        } else {
          timerDuration = min * 60 * 1000;
          timerStart = performance.now();
          timerSvg.classList.remove('done');
          timerSvg.classList.add('active');
        }
      });
    });

    // ── audio ────────────────────────────────────────────────────────────────
    let audioCtx    = null;
    let soundMode   = null; // null | 'binaural' | 'rain'
    let silenced    = false;

    // binaural nodes
    let binauralMaster = null;
    let breathGain     = null;

    // rain nodes
    let rainMaster = null;

    function ensureCtx() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function initBinaural() {
      if (binauralMaster) return;
      ensureCtx();

      binauralMaster = audioCtx.createGain();
      binauralMaster.gain.value = 0;
      binauralMaster.connect(audioCtx.destination);

      breathGain = audioCtx.createGain();
      breathGain.gain.value = 0.08;
      breathGain.connect(binauralMaster);

      // 432 Hz left, 436 Hz right → 4 Hz binaural beat
      const oscL = audioCtx.createOscillator();
      oscL.type = 'sine';
      oscL.frequency.value = 432;
      const panL = audioCtx.createStereoPanner();
      panL.pan.value = -1;
      oscL.connect(panL);
      panL.connect(breathGain);
      oscL.start();

      const oscR = audioCtx.createOscillator();
      oscR.type = 'sine';
      oscR.frequency.value = 436;
      const panR = audioCtx.createStereoPanner();
      panR.pan.value = 1;
      oscR.connect(panR);
      panR.connect(breathGain);
      oscR.start();
    }

    function initRain() {
      if (rainMaster) return;
      ensureCtx();

      rainMaster = audioCtx.createGain();
      rainMaster.gain.value = 0;
      rainMaster.connect(audioCtx.destination);

      // intermediate swell node — LFO waves the rain in and out
      const rainSwell = audioCtx.createGain();
      rainSwell.gain.value = 0.72;
      rainSwell.connect(rainMaster);

      // LFO: ~17 s per wave, depth ±0.28 → swell oscillates 0.44 → 1.0
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.06;
      const lfoDepth = audioCtx.createGain();
      lfoDepth.gain.value = 0.28;
      lfo.connect(lfoDepth);
      lfoDepth.connect(rainSwell.gain);
      lfo.start();

      function noiseSource() {
        const len  = audioCtx.sampleRate * 3;
        const buf  = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.loop = true;
        return src;
      }

      // Layer 1: broadband rain body
      const src1  = noiseSource();
      const hp    = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 380;
      const lp    = audioCtx.createBiquadFilter();
      lp.type = 'lowpass';  lp.frequency.value = 7200; lp.Q.value = 0.4;
      const g1    = audioCtx.createGain(); g1.gain.value = 0.48;
      src1.connect(hp); hp.connect(lp); lp.connect(g1); g1.connect(rainSwell);
      src1.start();

      // Layer 2: mids patter — gives the distinct drop texture
      const src2  = noiseSource();
      const bp    = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 0.7;
      const g2    = audioCtx.createGain(); g2.gain.value = 0.18;
      src2.connect(bp); bp.connect(g2); g2.connect(rainSwell);
      src2.start();
    }

    // ── spring peepers — for DM ─────────────────────────────────────────────
    let frogsMaster = null;
    let frogsTimer  = null;

    // five frogs: distinct pitches, spread across the stereo field, offset intervals
    const FROGS_CFG = [
      { freq: 2340, pan: -0.72, interval: 0.92, nextCall: 0 },
      { freq: 2460, pan: -0.28, interval: 1.18, nextCall: 0 },
      { freq: 2560, pan:  0.08, interval: 0.78, nextCall: 0 },
      { freq: 2640, pan:  0.52, interval: 1.34, nextCall: 0 },
      { freq: 2400, pan:  0.80, interval: 1.05, nextCall: 0 },
    ];
    let frogPanners = null;

    function initFrogs() {
      if (frogsMaster) return;
      ensureCtx();
      frogsMaster = audioCtx.createGain();
      frogsMaster.gain.value = 0;
      frogsMaster.connect(audioCtx.destination);
      frogPanners = FROGS_CFG.map(cfg => {
        const p = audioCtx.createStereoPanner();
        p.pan.value = cfg.pan;
        p.connect(frogsMaster);
        return p;
      });
    }

    function scheduleChirp(when, freq, panner) {
      const lp = audioCtx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 2800;
      lp.Q.value = 0.5;
      lp.connect(panner);

      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0, when);
      env.gain.linearRampToValueAtTime(0.44, when + 0.018);
      env.gain.setValueAtTime(0.44, when + 0.123);
      env.gain.exponentialRampToValueAtTime(0.001, when + 0.240);
      env.connect(lp);

      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq - 195, when);
      osc.frequency.linearRampToValueAtTime(freq, when + 0.038);
      osc.connect(env);
      osc.start(when);
      osc.stop(when + 0.28);
    }

    function tickFrogs() {
      const now       = audioCtx.currentTime;
      const lookahead = 0.12;
      FROGS_CFG.forEach((cfg, i) => {
        if (cfg.nextCall < now + lookahead) {
          scheduleChirp(Math.max(cfg.nextCall, now + 0.01), cfg.freq, frogPanners[i]);
          cfg.nextCall = Math.max(cfg.nextCall, now) + cfg.interval + (Math.random() - 0.5) * 0.28;
        }
      });
    }

    function startFrogs() {
      initFrogs();
      const now = audioCtx.currentTime;
      FROGS_CFG.forEach((cfg, i) => { cfg.nextCall = now + i * 0.18 + Math.random() * 0.35; });
      frogsTimer = setInterval(tickFrogs, 50);
    }

    function stopFrogs() {
      clearInterval(frogsTimer);
      frogsTimer = null;
    }

    function updateSoundBtns() {
      document.getElementById('silenceBtn').classList.toggle('active',  silenced);
      document.getElementById('binauralBtn').classList.toggle('active', !silenced && soundMode === 'binaural');
      document.getElementById('rainBtn').classList.toggle('active',     !silenced && soundMode === 'rain');
      document.getElementById('frogsBtn').classList.toggle('active',    !silenced && soundMode === 'frogs');
    }

    function applyGains() {
      const on = !silenced;
      if (binauralMaster) binauralMaster.gain.setTargetAtTime(on && soundMode === 'binaural' ? 1.00 : 0, audioCtx.currentTime, 1.5);
      if (rainMaster)     rainMaster.gain.setTargetAtTime(on && soundMode === 'rain'         ? 0.65 : 0, audioCtx.currentTime, 1.5);
      if (frogsMaster)    frogsMaster.gain.setTargetAtTime(on && soundMode === 'frogs'       ? 0.88 : 0, audioCtx.currentTime, 1.5);
    }

    function setMode(mode) {
      ensureCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const prev = soundMode;
      if (mode === soundMode && !silenced) {
        soundMode = null;
      } else {
        soundMode = mode;
        if (mode === 'binaural') initBinaural();
        if (mode === 'rain')     initRain();
        if (mode === 'frogs')    startFrogs();
        silenced = false;
      }

      if (prev === 'frogs' && soundMode !== 'frogs') stopFrogs();

      applyGains();
      updateSoundBtns();
    }

    document.getElementById('silenceBtn').addEventListener('click', () => {
      if (soundMode === null) return;
      silenced = !silenced;
      ensureCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      applyGains();
      updateSoundBtns();
    });

    document.getElementById('binauralBtn').addEventListener('click', () => setMode('binaural'));
    document.getElementById('rainBtn').addEventListener('click',     () => setMode('rain'));
    document.getElementById('frogsBtn').addEventListener('click',    () => setMode('frogs'));

    // current expansion (0 = orb small, 1 = orb full) — updated in tick
    let currentExpansion = 0;
    let lastVibratePhase = 0; // init to 0 so page load doesn't vibrate

    function updateSoundBreath(expansion) {
      if (!breathGain || soundMode !== 'binaural') return;
      // subtle swell on inhale: 0.065 → 0.095
      breathGain.gain.setTargetAtTime(0.065 + expansion * 0.030, audioCtx.currentTime, 0.8);
    }

    // ── parallax ─────────────────────────────────────────────────────────────
    const scene = document.querySelector('.scene');
    const MAX_SHIFT = 14; // px — subtle, not seasick
    let targetPX = 0, targetPY = 0;
    let currentPX = 0, currentPY = 0;

    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      targetPX = ((e.clientX - cx) / cx) * MAX_SHIFT;
      targetPY = ((e.clientY - cy) / cy) * MAX_SHIFT;
    });

    function handleOrientation(e) {
      const gamma = Math.max(-45, Math.min(45, e.gamma || 0));
      // beta 45° is a comfortable resting hold angle on a phone; offset so neutral = no shift
      const beta  = Math.max(-45, Math.min(45, (e.beta  || 0) - 45));
      targetPX = (gamma / 45) * MAX_SHIFT;
      targetPY = (beta  / 45) * MAX_SHIFT;
    }

    if (typeof DeviceOrientationEvent !== 'undefined') {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS 13+ requires explicit permission — ask on first touch
        document.addEventListener('touchstart', function askOrient() {
          DeviceOrientationEvent.requestPermission()
            .then(s => { if (s === 'granted') window.addEventListener('deviceorientation', handleOrientation); })
            .catch(() => {});
        }, { once: true });
      } else {
        window.addEventListener('deviceorientation', handleOrientation);
      }
    }

    // ── slow warm color oscillation (~80 s cycle) ───────────────────────────
    // Sine oscillation: −15° (deeper red) → 0° (base sunset) → +35° (golden)
    // Never leaves the warm band — no greens, blues, or purples.
    let hueStart = performance.now();
    const HUE_CYCLE = 80000; // 80s per sine cycle

    // ── particle system ─────────────────────────────────────────────────────
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const PARTICLE_COUNT = 18;
    const particles = [];

    function orbCenter() {
      const rect = orb.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2,
        y: rect.top  + rect.height / 2,
        r: rect.width / 2,
      };
    }

    function spawnParticle() {
      const c = orbCenter();
      const angle = Math.random() * Math.PI * 2;
      const dist  = c.r * (0.7 + Math.random() * 0.5);
      return {
        x:     c.x + Math.cos(angle) * dist,
        y:     c.y + Math.sin(angle) * dist,
        vx:    (Math.random() - 0.5) * 0.18,
        vy:    -(0.25 + Math.random() * 0.35),
        size:  0.8 + Math.random() * 1.4,
        alpha: 0,
        life:  0,
        maxLife: 120 + Math.random() * 180, // frames
      };
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = spawnParticle();
      p.life = Math.random() * p.maxLife; // stagger start
      particles.push(p);
    }

    // ── moon ─────────────────────────────────────────────────────────────────
    const moonEl = document.getElementById('moon');
    let moonOn = false;
    document.getElementById('moon-btn').addEventListener('click', () => {
      moonOn = !moonOn;
      moonEl.classList.toggle('on', moonOn);
      document.getElementById('moon-btn').classList.toggle('active', moonOn);
    });

    // ── nothing ───────────────────────────────────────────────────────────────
    // ── nothing / reset ───────────────────────────────────────────────────────
    let nothingOn = false;

    function clearScene() {
      starsOn = firefliesOn = leavesOn = moonOn = false;
      moonEl.classList.remove('on');
      ['stars-btn','fireflies-btn','leaves-btn','moon-btn'].forEach(id =>
        document.getElementById(id).classList.remove('active')
      );
      if (currentShape === 'bloom') {
        currentShape = 'orb';
        orb.classList.remove('hidden');
        bloomSvg.classList.remove('active');
        document.getElementById('orbBtn').classList.add('active');
        document.getElementById('bloomBtn').classList.remove('active');
      }
    }

    function setNothingMode(on) {
      nothingOn = on;
      document.getElementById('nothing-btn').classList.toggle('active', on);
      label.classList.toggle('nothing-hide', on);
      document.getElementById('branding').classList.toggle('nothing-hide', on);
      if (on) clearScene();
    }

    document.getElementById('nothing-btn').addEventListener('click', () => {
      setNothingMode(!nothingOn);
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      // scene
      setNothingMode(false);
      clearScene();
      // sound
      if (soundMode === 'frogs') stopFrogs();
      soundMode = null;
      silenced  = false;
      applyGains();
      updateSoundBtns();
      // timer
      timerDuration = 0;
      timerStart    = null;
      timerSvg.classList.remove('active', 'done');
      timerFill.style.strokeDashoffset = CIRCUM;
      document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
      // pattern
      currentPattern = '4-4';
      phaseIndex = 0;
      phaseStart = performance.now();
      displayedLabel = null;
      updateCssCycle();
      document.querySelectorAll('.dot').forEach(d =>
        d.classList.toggle('active', d.dataset.pattern === '4-4')
      );
      savePrefs();
    });

    // ── fireflies ─────────────────────────────────────────────────────────────
    let firefliesOn = false;
    const fireflies = Array.from({ length: 22 }, () => ({
      x:          Math.random() * window.innerWidth,
      y:          Math.random() * window.innerHeight,
      vx:         (Math.random() - 0.5) * 0.25,
      vy:         (Math.random() - 0.5) * 0.18,
      phase:      Math.random() * Math.PI * 2,
      blinkSpeed: 0.00050 + Math.random() * 0.00090,
      size:       1.0 + Math.random() * 1.6,
    }));

    document.getElementById('fireflies-btn').addEventListener('click', () => {
      firefliesOn = !firefliesOn;
      document.getElementById('fireflies-btn').classList.toggle('active', firefliesOn);
    });

    function drawFireflies(now) {
      for (const f of fireflies) {
        f.vx += (Math.random() - 0.5) * 0.014;
        f.vy += (Math.random() - 0.5) * 0.010;
        f.vx = Math.max(-0.42, Math.min(0.42, f.vx));
        f.vy = Math.max(-0.32, Math.min(0.32, f.vy));
        f.x += f.vx;
        f.y += f.vy;
        if (f.x < 0) f.x = canvas.width;
        if (f.x > canvas.width)  f.x = 0;
        if (f.y < 0) f.y = canvas.height;
        if (f.y > canvas.height) f.y = 0;

        const blink = Math.sin(f.phase + now * f.blinkSpeed);
        if (blink > 0.82) {
          const a = (blink - 0.82) / 0.18;
          ctx.beginPath();
          ctx.arc(f.x, f.y, f.size * 5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(180,255,120,${(a * 0.11).toFixed(3)})`;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(220,255,160,${(a * 0.88).toFixed(3)})`;
          ctx.fill();
        }
      }
    }

    // ── falling leaves ────────────────────────────────────────────────────────
    let leavesOn = false;
    const LEAF_COLORS = [
      'rgba(210, 95, 25, 0.85)', 'rgba(195,135,20,0.85)',
      'rgba(175, 55, 15, 0.80)', 'rgba(225,155,25,0.85)',
      'rgba(155, 75, 20, 0.80)',
    ];

    function makeLeaf(anywhere) {
      return {
        x:         Math.random() * window.innerWidth,
        y:         anywhere ? Math.random() * window.innerHeight : -20,
        vx:        (Math.random() - 0.5) * 0.7,
        vy:        0.35 + Math.random() * 0.55,
        rotation:  Math.random() * Math.PI * 2,
        rotSpeed:  (Math.random() - 0.5) * 0.022,
        swayPhase: Math.random() * Math.PI * 2,
        swaySpeed: 0.0008 + Math.random() * 0.0008,
        swayAmp:   0.28 + Math.random() * 0.45,
        size:      4 + Math.random() * 7,
        color:     LEAF_COLORS[Math.floor(Math.random() * LEAF_COLORS.length)],
      };
    }

    const leaves = Array.from({ length: 16 }, () => makeLeaf(true));

    document.getElementById('leaves-btn').addEventListener('click', () => {
      leavesOn = !leavesOn;
      document.getElementById('leaves-btn').classList.toggle('active', leavesOn);
    });

    function drawLeaves(now) {
      for (const lf of leaves) {
        const sway = Math.sin(lf.swayPhase + now * lf.swaySpeed) * lf.swayAmp;
        lf.x += lf.vx + sway;
        lf.y += lf.vy;
        lf.rotation += lf.rotSpeed;
        if (lf.y > canvas.height + 20) Object.assign(lf, makeLeaf(false));

        ctx.save();
        ctx.translate(lf.x, lf.y);
        ctx.rotate(lf.rotation);
        const s = lf.size;
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.bezierCurveTo( s * 0.7, -s * 0.4,  s * 0.7,  s * 0.4, 0,  s);
        ctx.bezierCurveTo(-s * 0.7,  s * 0.4, -s * 0.7, -s * 0.4, 0, -s);
        ctx.fillStyle = lf.color;
        ctx.fill();
        ctx.restore();
      }
    }

    // ── star field ───────────────────────────────────────────────────────────
    let starsOn = false;
    const stars = Array.from({ length: 110 }, () => ({
      x:         Math.random(),
      y:         Math.random(),
      r:         0.35 + Math.random() * 1.3,
      baseAlpha: 0.10 + Math.random() * 0.45,
      phase:     Math.random() * Math.PI * 2,
      speed:     0.00035 + Math.random() * 0.00065,
    }));

    document.getElementById('stars-btn').addEventListener('click', () => {
      starsOn = !starsOn;
      document.getElementById('stars-btn').classList.toggle('active', starsOn);
    });

    function drawParticles(hue, now) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (starsOn) {
        for (const s of stars) {
          const alpha = s.baseAlpha * (0.55 + 0.45 * Math.sin(s.phase + now * s.speed));
          ctx.beginPath();
          ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 238, 195, ${alpha.toFixed(3)})`;
          ctx.fill();
        }
      }
      if (firefliesOn) drawFireflies(now);
      if (leavesOn)    drawLeaves(now);

      for (const p of particles) {
        p.life++;
        p.x += p.vx;
        p.y += p.vy;

        const t = p.life / p.maxLife;
        // fade in quickly, hold, then fade out
        p.alpha = t < 0.15 ? t / 0.15 :
                  t < 0.75 ? 1 :
                  (1 - t) / 0.25;
        p.alpha *= 0.38; // max opacity

        if (p.life >= p.maxLife) {
          Object.assign(p, spawnParticle());
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${30 + hue * 0.6}, 85%, 72%, ${p.alpha})`;
        ctx.fill();
      }
    }

    // ── time-of-day color tinting ────────────────────────────────────────────
    // Warm amber at dawn (4-10) and dusk (16-22), deep indigo at night (22-4),
    // invisible during the day. Runs on load + every 60 s; no per-frame cost.
    const todOverlay = document.getElementById('tod-overlay');

    function smoothstep(a, b, t) {
      t = Math.max(0, Math.min(1, (t - a) / (b - a)));
      return t * t * (3 - 2 * t);
    }

    function applyToD() {
      const h = new Date().getHours() + new Date().getMinutes() / 60;

      // dawn: peaks 5-7, fades 4→5 and 7→10
      const dawn = h >= 4 && h < 10
        ? (h < 5 ? smoothstep(4, 5, h) : h < 7 ? 1 : smoothstep(10, 7, h))
        : 0;

      // dusk: peaks 17-20, fades 16→17 and 20→22
      const dusk = h >= 16 && h < 22
        ? (h < 17 ? smoothstep(16, 17, h) : h < 20 ? 1 : smoothstep(22, 20, h))
        : 0;

      // night: peaks 23-3, fades 22→23 and 3→4
      const night = (h >= 22 || h < 4)
        ? (h >= 22 ? smoothstep(22, 23, h) : h < 3 ? 1 : smoothstep(4, 3, h))
        : 0;

      const warmth = Math.max(dawn, dusk);

      if (night > 0.01) {
        // deep indigo night tint
        const a = (night * 0.10).toFixed(3);
        todOverlay.style.background = `rgba(40, 20, 100, ${a})`;
      } else if (warmth > 0.01) {
        // amber dawn/dusk tint
        const a = (warmth * 0.09).toFixed(3);
        todOverlay.style.background = `rgba(255, 170, 60, ${a})`;
      } else {
        todOverlay.style.background = 'transparent';
      }
    }

    applyToD();
    setInterval(applyToD, 60_000);

    // ── warm (blue light filter) button ─────────────────────────────────────
    const warmBtn     = document.getElementById('warm-btn');
    const warmOverlay = document.getElementById('warm-overlay');
    let warmOn = false;

    warmBtn.addEventListener('click', () => {
      warmOn = !warmOn;
      warmOverlay.classList.toggle('on', warmOn);
      warmBtn.classList.toggle('active', warmOn);
    });

    // ── dim button ───────────────────────────────────────────────────────────
    const dimBtn     = document.getElementById('dim-btn');
    const dimOverlay = document.getElementById('dim-overlay');
    let dimOn = false;

    dimBtn.addEventListener('click', () => {
      dimOn = !dimOn;
      dimOverlay.classList.toggle('on', dimOn);
      dimBtn.classList.toggle('active', dimOn);
      dimBtn.textContent = dimOn ? 'undim' : 'dim';
    });

    // ── dark mode toggle ─────────────────────────────────────────────────────
    const darkBtn = document.getElementById('dark-btn');
    // default true; savePrefs writes this via darkOnInit alias
    const _sd = localStorage.getItem('mop_dark');
    let darkOn = _sd === null ? true : _sd === 'true';
    document.documentElement.dataset.theme = darkOn ? 'dark' : '';
    darkBtn.classList.toggle('active', darkOn);

    darkBtn.addEventListener('click', () => {
      darkOn = !darkOn;
      document.documentElement.dataset.theme = darkOn ? 'dark' : '';
      darkBtn.classList.toggle('active', darkOn);
      savePrefs();
    });

    // ── wake lock ────────────────────────────────────────────────────────────
    // Prevents the screen sleeping mid-session. Re-acquired on tab visibility
    // change because wake lock is automatically released when the tab is hidden.
    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try { await navigator.wakeLock.request('screen'); } catch (_) {}
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });

    // ── service worker ───────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // ── bloom shape ──────────────────────────────────────────────────────────
    let currentShape = 'orb';
    const bloomSvg       = document.getElementById('bloomSvg');
    const bloomCenterEl  = document.getElementById('bloomCenter');
    const petalBase      = document.querySelectorAll('.petal-base');
    const petalExtra     = document.querySelectorAll('.petal-extra');

    function petalD(t) {
      const len = 40 + t * 38;
      const w   =  5 + t * 22;
      const off =  6 + t * 10;
      const y0  = -off;
      const y1  = -(off + len);
      const cy1 = -(off + len * 0.35);
      const cy2 = -(off + len * 0.72);
      return `M 0 ${y0.toFixed(1)} C ${w.toFixed(1)} ${cy1.toFixed(1)},${w.toFixed(1)} ${cy2.toFixed(1)},0 ${y1.toFixed(1)} C ${(-w).toFixed(1)} ${cy2.toFixed(1)},${(-w).toFixed(1)} ${cy1.toFixed(1)},0 ${y0.toFixed(1)}`;
    }

    function updateBloom(expansion, hue) {
      const d = petalD(expansion);
      petalBase.forEach(p => p.setAttribute('d', d));
      petalExtra.forEach(p => p.setAttribute('d', d));

      // extra petals fade in after expansion > 0.3, fully visible at 0.75
      const extraOpacity = Math.max(0, Math.min(1, (expansion - 0.3) / 0.45)).toFixed(3);
      petalExtra.forEach(p => p.style.opacity = extraOpacity);

      bloomCenterEl.setAttribute('r', (6 + expansion * 5).toFixed(1));
      const gs = (8 + expansion * 24).toFixed(1);
      const ga = (0.22 + expansion * 0.48).toFixed(2);
      bloomSvg.style.filter = `hue-rotate(${hue.toFixed(1)}deg) drop-shadow(0 0 ${gs}px rgba(255,160,40,${ga}))`;
    }

    document.getElementById('orbBtn').addEventListener('click', () => {
      currentShape = 'orb';
      orb.classList.remove('hidden');
      bloomSvg.classList.remove('active');
      document.getElementById('orbBtn').classList.add('active');
      document.getElementById('bloomBtn').classList.remove('active');
    });

    document.getElementById('bloomBtn').addEventListener('click', () => {
      currentShape = 'bloom';
      orb.classList.add('hidden');
      bloomSvg.classList.add('active');
      document.getElementById('bloomBtn').classList.add('active');
      document.getElementById('orbBtn').classList.remove('active');
    });

    bloomSvg.addEventListener('click', togglePause);

    // ── main loop ────────────────────────────────────────────────────────────
    const LERP = 0.055; // slow follow — feels meditative, not jittery

    function tick(now) {
      // parallax: ease toward target
      currentPX += (targetPX - currentPX) * LERP;
      currentPY += (targetPY - currentPY) * LERP;
      scene.style.transform = `translate(${currentPX.toFixed(2)}px, ${currentPY.toFixed(2)}px)`;

      // color shift
      const hue = 10 + Math.sin((now - hueStart) / HUE_CYCLE * Math.PI * 2) * 25;
      orb.style.filter = `hue-rotate(${hue.toFixed(1)}deg)`;

      // particles
      drawParticles(hue, now);

      // timer arc
      if (timerDuration > 0 && timerStart !== null) {
        const elapsed = now - timerStart;
        const progress = Math.min(elapsed / timerDuration, 1);
        timerFill.style.strokeDashoffset = CIRCUM * (1 - progress);

        if (progress >= 1 && !timerSvg.classList.contains('done')) {
          timerSvg.classList.add('done');
          timerSvg.classList.remove('active');
          timerDuration = 0;
          document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
        }
      }

      // breathing phase
      if (!paused) {
        const phases = getPhases();
        const phaseDurMs = phases[phaseIndex][1] * 1000;
        const elapsed = now - phaseStart;

        if (elapsed >= phaseDurMs) {
          phaseIndex = (phaseIndex + 1) % phases.length;
          phaseStart = now;
        }

        updateLabel(phases[phaseIndex][0]);

        // haptic pulse on each phase change
        if (phaseIndex !== lastVibratePhase) {
          if (navigator.vibrate) navigator.vibrate(18);
          lastVibratePhase = phaseIndex;
        }

        const progress = Math.min((now - phaseStart) / (phases[phaseIndex][1] * 1000), 1);
        currentExpansion = phaseToExpansion(phaseIndex, progress);
        updateSoundBreath(currentExpansion);
      }

      // drive orb scale + shadow from JS so they stay exactly in sync with the label
      {
        const scale = 0.84 + currentExpansion * (1.12 - 0.84);
        orb.style.transform = `scale(${scale.toFixed(4)})`;
        orb.style.boxShadow = lerpShadow(currentExpansion);
      }

      if (currentShape === 'bloom') updateBloom(currentExpansion, hue);

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
